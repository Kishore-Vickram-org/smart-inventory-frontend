<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      // GitHub Pages doesn't support SPA routing for project pages.
      // This redirects all 404s to /?/<path> so index.html can restore the route.
      ;(function () {
        const segmentCount = 1 // /<repo-name>/

        const l = window.location
        const origin = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '')
        const base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/')
        const path = l.pathname
          .slice(1)
          .split('/')
          .slice(segmentCount)
          .join('/')
          .replace(/&/g, '~and~')

        const search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : ''
        l.replace(origin + base + '/?/' + path + search + l.hash)
      })()
    </script>
  </head>
  <body></body>
</html>
