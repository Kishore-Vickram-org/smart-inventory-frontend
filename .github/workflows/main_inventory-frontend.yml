# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - inventory-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js version
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '20.x'

      - name: npm install, build, and test
        run: |
          npm ci --ignore-scripts
          npm run build --if-present
          npm run test --if-present

      - name: Create deployment folder
        run: |
          rm -rf deploy
          mkdir -p deploy/scripts
          cp -r build deploy/build
          cp scripts/static-server.js deploy/scripts/static-server.js
          cat > deploy/package.json <<'JSON'
          {
            "name": "inventory-frontend-runtime",
            "private": true,
            "version": "1.0.0",
            "engines": {
              "node": ">=18 <21"
            },
            "scripts": {
              "start": "node scripts/static-server.js"
            }
          }
          JSON

      - name: Inspect deployment folder
        run: |
          echo "Listing deploy folder (first 200 entries)"
          (cd deploy && find . -maxdepth 4 -print | sed -n '1,200p')

          echo "Fail if any file path contains backslash"
          if (cd deploy && find . -name '*\\*' -print -quit | grep -q .); then
            echo "ERROR: Found path containing backslash in deploy folder" >&2
            (cd deploy && find . -name '*\\*' -print | sed -n '1,50p')
            exit 1
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: node-app

      - name: Inspect downloaded artifact
        run: |
          ls -la
          find . -maxdepth 4 -print | sed -n '1,200p'
      
      - name: Login to Azure
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_23BA77B98FB84952A85BB0CC11C067AC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3D95E559AB084E1ABAA2164CD83C8468 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AFBBCEE9E213452E8CD00EF3DA8BB2FD }}

      - name: Configure App Service settings (no build during deploy)
        uses: azure/appservice-settings@1808c4fbba4b8723107948a295d396a5c0e33dcd # v1
        with:
          app-name: 'inventory-frontend'
          app-settings-json: |
            [
              {"name": "SCM_DO_BUILD_DURING_DEPLOYMENT", "value": "false"},
              {"name": "WEBSITE_RUN_FROM_PACKAGE", "value": "1"}
            ]

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@2e64e04aaaeeec4396edcb982544dbd30f8e9ddf # v3
        with:
          app-name: 'inventory-frontend'
          slot-name: 'Production'
          package: .
          